name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
      - name: Build
        run: cargo build --release
      - name: Test
        run: cargo test --lib
      - name: Clippy
        run: cargo clippy --lib -- -D warnings

  gpu-test:
    runs-on: [self-hosted, gpu]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Build with GPU features
        run: cargo build --release --features "wgpu,cuda"
      - name: Test with GPU
        run: cargo test --lib --features "wgpu,cuda"
