name: Deploy WASM demo to GitHub Pages

on:
  push:
    branches: [feature/wasm-web-ui]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: wasm-${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: wasm-${{ runner.os }}-cargo-

      - name: Install wasm-pack
        run: cargo install wasm-pack

      - name: Install Python deps
        run: pip install numpy tomli

      - name: Generate presets
        run: python3 scripts/gen_presets.py

      - name: Build WASM
        run: wasm-pack build --target web --no-default-features --features wasm

      - name: Assemble site
        run: |
          mkdir -p _site/pkg
          cp web/index.html _site/
          cp pkg/* _site/pkg/

      - name: Verify site
        run: |
          test -f _site/index.html
          test -f _site/pkg/hyburn.js
          test -f _site/pkg/hyburn_bg.wasm
          echo "Site size: $(du -sh _site | cut -f1)"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
