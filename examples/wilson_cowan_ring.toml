# Wilson-Cowan whole-brain — 74 nodes, 10k steps
#
# Run:
#   hyburn run -c examples/wilson_cowan_ring.toml -o output/wc --backend ndarray
#   hyburn run -c examples/wilson_cowan_ring.toml -o output/wc --backend cuda

sim_length = 1000.0
dt = 0.1
integrator = "heun"
nsig = 0.02

[network]

[[network.subnetworks]]
model = "WilsonCowan"
nnodes = 74
nmodes = 1
params = [16.0, 12.0, 15.0, 3.0, 8.0, 8.0,
          1.3, 4.0, 1.0, 4.0, 2.0, 3.7, 1.0, 1.75,
          1.0, 1.0, 1.0, 1.0, 0.55, 0.0, 0.5, 0.5]
initial_state = "examples/init_wc_74.npy"

[[network.projections]]
src = 0
tgt = 0
conn_type = "all_to_all"
coupling_fn = "Linear"
coupling_params = [0.1]
weights = 0.01
cvar_map = "0:0"
delays = []
