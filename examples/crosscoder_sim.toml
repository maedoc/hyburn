# CrossCoder sim placeholder — 74 nodes, 10k steps
#
# The projection weight matrix will be injected at runtime by the
# CrossCoder pipeline from the latent prior.
#
# Run:
#   hyburn run -c examples/crosscoder_sim.toml -o output/cc --backend ndarray
#   hyburn run -c examples/crosscoder_sim.toml -o output/cc --backend cuda

sim_length = 1000.0
dt = 0.1
integrator = "heun"
nsig = 0.05

[network]

[[network.subnetworks]]
model = "Generic2dOscillator"
nnodes = 74
nmodes = 1
params = [1.0, 0.2, -2.0, -10.0, 0.0, 0.02, 3.0, 1.0, 0.0, 1.0, 1.0, 1.0]
initial_state = "examples/init_g2do_74.npy"

[[network.projections]]
src = 0
tgt = 0
conn_type = "all_to_all"
coupling_fn = "Linear"
coupling_params = [0.1]
weights = 0.01
cvar_map = "0:0"
delays = []
