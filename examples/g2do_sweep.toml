# G2DO sweep-ready config — 74 nodes, 10k steps, inline initial_state
#
# This variant uses inline initial_state for batch sweep compatibility.
#
# Run sweep (128 points):
#   hyburn run -c examples/g2do_sweep.toml -o output/sweep \
#     --sweep examples/sweep.toml --backend ndarray
#   hyburn run -c examples/g2do_sweep.toml -o output/sweep \
#     --sweep examples/sweep.toml --backend cuda

sim_length = 1000.0
dt = 0.1
integrator = "heun"
nsig = 0.0

[network]

[[network.subnetworks]]
model = "Generic2dOscillator"
