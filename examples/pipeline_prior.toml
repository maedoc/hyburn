# Multi-parameter SBI pipeline — 74 nodes, 128 samples
#
# Run:
#   hyburn pipeline -c examples/demo.toml -p examples/pipeline_prior.toml -o output/pipeline --backend ndarray
#   hyburn pipeline -c examples/demo.toml -p examples/pipeline_prior.toml -o output/pipeline --backend cuda

n_steps = 10000
n_samples = 128
hidden_units = 64
n_flows = 4
epochs = 200
batch_size = 16
learning_rate = 1e-3

[prior]
BoxUniform = [
    { name = "subnetworks[0].params[1]", min = -0.5, max = 0.5 },
    { name = "subnetworks[0].params[5]", min = 0.01, max = 0.05 },
]
seed = 42
