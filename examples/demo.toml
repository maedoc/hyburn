# hyburn demo — 74 nodes, 10k steps
#
# Quick start:
#   hyburn run -c examples/demo.toml -o output/demo --backend ndarray
#   hyburn run -c examples/demo.toml -o output/demo --backend cuda
#
# With sweep (128 points):
#   hyburn run -c examples/demo.toml -o output/demo --sweep examples/sweep.toml --backend ndarray
#
# SBI pipeline:
#   hyburn pipeline -c examples/demo.toml -p examples/pipeline_prior.toml -o output/pipeline

sim_length = 1000.0
dt = 0.1
integrator = "heun"
nsig = 0.0

[network]

[[network.subnetworks]]
model = "Generic2dOscillator"
nnodes = 74
nmodes = 1
params = [1.0, 0.0, -2.0, -10.0, 0.0, 0.02, 3.0, 1.0, 0.0, 1.0, 1.0, 1.0]
initial_state = "examples/init_g2do_74.npy"

[[network.projections]]
src = 0
tgt = 0
conn_type = "all_to_all"
coupling_fn = "Linear"
coupling_params = [0.01]
weights = 0.01
cvar_map = "0:0"
delays = []
